<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Meme Are You?</title>

<!-- Google Analytics (replace with your ID) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX');
</script>

<style>
body {
  font-family: 'Arial', sans-serif;
  background: #111;
  color: #fff;
  text-align: center;
  padding: 20px;
  transition: background 1s ease;
}
h1 { font-size: 2.5em; margin-bottom: 20px; color: #22c55e; }
button { background-color: #22c55e; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
button:hover { transform: scale(1.1); }
#quiz, #result, #countdown, #leaderboard, #streak { margin-top: 30px; }
.choice-btn { background-color: #334155; margin: 10px; padding: 10px 20px; font-size: 18px; border-radius: 6px; cursor: pointer; display: block; width: 200px; margin-left:auto; margin-right:auto; transition: transform 0.2s; }
.choice-btn:hover { transform: scale(1.05); }
#result img { max-width: 200px; margin-top: 10px; border-radius: 12px; }
.share-buttons { margin-top:20px; }
</style>
</head>

<body>

<h1>Which Meme Are You?</h1>
<p>Take this quick quiz and find your viral meme personality!</p>

<div id="streak"></div>
<div id="quiz"><button onclick="startQuiz()">Start Quiz</button></div>
<div id="countdown"></div>
<div id="result"></div>
<div id="leaderboard"></div>

<!-- AdSense placeholder -->
<div id="ad-banner">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="YYYYYYYYYY"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<!-- Sounds -->
<audio id="dingSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="memeSound1" src="https://www.soundjay.com/human/sounds/laugh-1.mp3"></audio>
<audio id="memeSound2" src="https://www.soundjay.com/human/sounds/laugh-2.mp3"></audio>
<audio id="memeSound3" src="https://www.soundjay.com/human/sounds/applause-1.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script>
// Meme images (real online links)
const memes = [
  {name:"Doge", img:"https://i.imgur.com/3XKZr0M.jpg", color:"#fbbf24", sound:"memeSound1"},
  {name:"Pepe the Frog", img:"https://i.imgur.com/4a6QJyj.png", color:"#34d399", sound:"memeSound2"},
  {name:"Woman Yelling at Cat", img:"https://i.imgur.com/0lYq5Ed.jpg", color:"#f472b6", sound:"memeSound3"},
  {name:"Distracted Boyfriend", img:"https://i.imgur.com/qGQWXlo.jpg", color:"#3b82f6", sound:"memeSound1"},
  {name:"Expanding Brain", img:"https://i.imgur.com/8q2DQ2s.jpg", color:"#f87171", sound:"memeSound2"}
];

const traits = ["Loves snacks","Secretly clever","Overreacts easily","Always chasing trends","Thinks a lot","Chaotic energy","Witty and funny","Lazy but cute","Too dramatic","Obsessed with memes"];
const emojis = ["🐶","🐸","😡🐱","😏👀","🧠💡","😂","🔥","😎","🤯","💀"];
const phrases = ["This is your vibe!","Share with friends!","Instant viral energy!","Meme legend status!","Certified chaos","Too relatable","Totally unpredictable","Screenshot this!","Your meme awaits!","Unlimited laughs!"];

const questions = [
  {q:"What do you usually do first thing after waking up?", choices:[
    {text:"Check Instagram/TikTok", points:{"Doge":2,"Pepe the Frog":3}},
    {text:"Play mobile games", points:{"Expanding Brain":3,"Doge":2}},
    {text:"Text your best friend", points:{"Distracted Boyfriend":3}},
    {text:"Hit snooze again", points:{"Woman Yelling at Cat":3}},
    {text:"Make breakfast", points:{"Expanding Brain":2}}
  ]},
  {q:"What’s your go-to snack?", choices:[
    {text:"Chips or fries", points:{"Doge":3,"Distracted Boyfriend":2}},
    {text:"Candy or chocolate", points:{"Pepe the Frog":3}},
    {text:"Fruit or healthy snacks", points:{"Expanding Brain":3}},
    {text:"Nothing, too lazy", points:{"Woman Yelling at Cat":3}},
    {text:"Ice cream or dessert", points:{"Pepe the Frog":2,"Doge":2}}
  ]},
  {q:"How do you spend your free time?", choices:[
    {text:"Scrolling memes/TikTok", points:{"Pepe the Frog":3,"Doge":1}},
    {text:"Playing video games", points:{"Doge":3,"Expanding Brain":2}},
    {text:"Talking to friends online", points:{"Distracted Boyfriend":3}},
    {text:"Listening to music", points:{"Woman Yelling at Cat":2}},
    {text:"Learning something new", points:{"Expanding Brain":3}}
  ]},
  {q:"Usual mood at school/work?", choices:[
    {text:"Super chill", points:{"Doge":2,"Pepe the Frog":2}},
    {text:"Always dramatic", points:{"Woman Yelling at Cat":3}},
    {text:"Focused and thoughtful", points:{"Expanding Brain":3}},
    {text:"Funny and teasing", points:{"Pepe the Frog":3,"Distracted Boyfriend":2}},
    {text:"Trendy/social", points:{"Distracted Boyfriend":3}}
  ]},
  {q:"React when tagged in a meme?", choices:[
    {text:"Immediately share", points:{"Doge":2,"Pepe the Frog":3}},
    {text:"Laugh quietly", points:{"Expanding Brain":3}},
    {text:"Comment dramatically", points:{"Woman Yelling at Cat":3}},
    {text:"Make a joke back", points:{"Pepe the Frog":3,"Distracted Boyfriend":2}},
    {text:"Ignore it", points:{"Expanding Brain":2}}
  ]}
];

let scores = {};

function startQuiz(){
  scores={}; memes.forEach(m=>scores[m.name]=0);
  showQuestion(0);
}

function showQuestion(i){
  if(i>=questions.length){
    showResult();
    return;
  }
  const quizDiv = document.getElementById("quiz");
  quizDiv.innerHTML = `<p>${questions[i].q}</p>`;
  questions[i].choices.forEach(choice=>{
    const btn = document.createElement("button");
    btn.className = "choice-btn";
    btn.innerText = choice.text;
    btn.onclick = () => {
      for(let m in choice.points){
        scores[m] += choice.points[m];
      }
      showQuestion(i+1);
    };
    quizDiv.appendChild(btn);
  });
}

function showResult(){
  const resultDiv = document.getElementById("result");
  let top = memes[0], max=0;
  for(let m of memes){
    if(scores[m.name] > max){
      max = scores[m.name];
      top = m;
    }
  }

  const emoji = emojis[Math.floor(Math.random()*emojis.length)];
  const trait = traits[Math.floor(Math.random()*traits.length)];
  const phrase = phrases[Math.floor(Math.random()*phrases.length)];

  document.body.style.background = top.color;
  
  resultDiv.innerHTML = `
    <h2>${emoji}</h2>
    <h2>${top.name}</h2>
    <img src="${top.img}" alt="${top.name}">
    <p>${trait}</p>
    <p><i>${phrase}</i></p>
    <div class="share-buttons">
      <button class="download-btn" onclick="downloadResult()">Download</button>
    </div>
  `;
}

function downloadResult(){
  html2canvas(document.getElementById("result")).then(canvas=>{
    const link = document.createElement("a");
    link.download = "my-meme-result.png";
    link.href = canvas.toDataURL();
    link.click();
  });
}
</script>
</body>
</html>

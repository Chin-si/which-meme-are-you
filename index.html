<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Which Meme Are You?</title>

<!-- Google Analytics Placeholder -->
<script async src="https://www.googletagmanager.com/gtag/js?id=G-XXXXXXXXXX"></script>
<script>
window.dataLayer = window.dataLayer || [];
function gtag(){dataLayer.push(arguments);}
gtag('js', new Date());
gtag('config', 'G-XXXXXXXXXX');
</script>

<style>
body { font-family: 'Arial', sans-serif; background: #111; color: #fff; text-align: center; padding: 20px; transition: background 1s ease; overflow-x: hidden; }
h1 { font-size: 2.5em; margin-bottom: 20px; color: #22c55e; }
button { background-color: #22c55e; border: none; padding: 15px 30px; font-size: 20px; border-radius: 8px; cursor: pointer; margin-top: 20px; transition: transform 0.2s; }
button:hover { transform: scale(1.1); }
#quiz, #result, #countdown, #leaderboard, #streak { margin-top: 30px; }
.choice-btn { background-color: #334155; margin: 10px; padding: 10px 20px; font-size: 18px; border-radius: 6px; cursor: pointer; display: block; width: 200px; margin-left:auto; margin-right:auto; transition: transform 0.2s; }
.choice-btn:hover { transform: scale(1.05); }
#countdown { font-size: 2em; margin-top: 50px; color: #facc15; animation: blink 1s infinite; }
@keyframes blink { 0%{opacity:1;}50%{opacity:0.3;}100%{opacity:1;} }
@keyframes pop { 0%{ transform:scale(0); opacity:0;}50%{transform:scale(1.3);opacity:1;}100%{transform:scale(1);} }
#result h2:first-child { animation: pop 0.5s ease; }
#result { border-radius: 20px; padding: 30px; margin-top: 30px; display:inline-block; background:rgba(0,0,0,0.6); min-width:250px; }
#result img { max-width:200px; margin-top:10px; border-radius:12px; }
.share-buttons { margin-top:20px; display:flex; flex-wrap:wrap; justify-content:center; gap:10px; }
.share-buttons button.download-btn { text-decoration:none; font-size:16px; color:white; background-color:#3b82f6; padding:10px 16px; border-radius:8px; transition: transform 0.2s; cursor:pointer; }
.share-buttons button.download-btn:hover { transform: scale(1.1); }
#leaderboard { margin-top:40px; text-align:center; }
#ad-banner { margin-top:40px; padding:15px; text-align:center; background-color:#222; border-radius:8px; font-size:16px; }
#ad-banner ins { display:block; margin:auto; }
#streak { margin-top:20px; font-size:18px; }
@media (max-width:600px){ h1{font-size:2em;} button,.choice-btn{font-size:16px; padding:12px 24px;} #result{padding:20px;} .share-buttons button.download-btn{font-size:14px; padding:8px 12px;} }
#confetti-canvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; }
</style>
</head>

<body>
<h1>Which Meme Are You?</h1>
<p>Take this quick quiz and find your viral meme personality!</p>

<div id="streak"></div>
<div id="quiz"><button onclick="startQuiz()">Start Quiz</button></div>
<div id="countdown"></div>
<div id="result"></div>
<div id="leaderboard"></div>

<!-- AdSense placeholder -->
<div id="ad-banner">
  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXXXXXXXXXXXXXX"
       data-ad-slot="YYYYYYYYYY"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>
  <script>
       (adsbygoogle = window.adsbygoogle || []).push({});
  </script>
</div>

<!-- Sounds -->
<audio id="dingSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3"></audio>
<audio id="memeSound1" src="https://www.soundjay.com/human/sounds/laugh-1.mp3"></audio>
<audio id="memeSound2" src="https://www.soundjay.com/human/sounds/laugh-2.mp3"></audio>
<audio id="memeSound3" src="https://www.soundjay.com/human/sounds/applause-1.mp3"></audio>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<canvas id="confetti-canvas"></canvas>

<script>
// --- Memes with online images ---
const memes=[
  {name:"Doge", img:"https://i.imgur.com/3XKZr0M.jpg", color:"#fbbf24", sound:"memeSound1"},
  {name:"Pepe the Frog", img:"https://i.imgur.com/4a6QJyj.png", color:"#34d399", sound:"memeSound2"},
  {name:"Woman Yelling at Cat", img:"https://i.imgur.com/0lYq5Ed.jpg", color:"#f472b6", sound:"memeSound3"},
  {name:"Distracted Boyfriend", img:"https://i.imgur.com/qGQWXlo.jpg", color:"#3b82f6", sound:"memeSound1"},
  {name:"Expanding Brain", img:"https://i.imgur.com/8q2DQ2s.jpg", color:"#f87171", sound:"memeSound2"}
];

const traits=["Loves snacks","Secretly clever","Overreacts easily","Always chasing trends","Thinks a lot","Chaotic energy","Witty and funny","Lazy but cute","Too dramatic","Obsessed with memes"];
const emojis=["🐶","🐸","😡🐱","😏👀","🧠💡","😂","🔥","😎","🤯","💀"];
const phrases=["This is your vibe!","Share with friends!","Instant viral energy!","Meme legend status!","Certified chaos","Too relatable","Totally unpredictable","Screenshot this!","Your meme awaits!","Unlimited laughs!"];

// --- Teen-focused questions ---
const questions=[
  {q:"What do you usually do first thing after waking up?", choices:[{text:"Check Instagram/TikTok", points:{"Doge":2,"Pepe the Frog":3}},{text:"Play mobile games", points:{"Expanding Brain":3,"Doge":2}},{text:"Text your best friend", points:{"Distracted Boyfriend":3}},{text:"Hit snooze and sleep more", points:{"Woman Yelling at Cat":3}},{text:"Make coffee or breakfast", points:{"Expanding Brain":2}}]},
  {q:"What’s your go-to snack?", choices:[{text:"Chips or fries", points:{"Doge":3,"Distracted Boyfriend":2}},{text:"Candy or chocolate", points:{"Pepe the Frog":3}},{text:"Fruit or healthy snacks", points:{"Expanding Brain":3}},{text:"Nothing, I’m too lazy", points:{"Woman Yelling at Cat":3}},{text:"Ice cream or desserts", points:{"Pepe the Frog":2,"Doge":2}}]},
  {q:"How do you spend your free time?", choices:[{text:"Scrolling memes / TikTok", points:{"Pepe the Frog":3,"Doge":1}},{text:"Playing video games", points:{"Doge":3,"Expanding Brain":2}},{text:"Talking with friends", points:{"Distracted Boyfriend":3}},{text:"Listening to music", points:{"Woman Yelling at Cat":2}},{text:"Studying / learning", points:{"Expanding Brain":3}}]},
  {q:"Usual mood at school or work?", choices:[{text:"Super chill", points:{"Doge":2,"Pepe the Frog":2}},{text:"Always overreacting", points:{"Woman Yelling at Cat":3}},{text:"Focused and brainy", points:{"Expanding Brain":3}},{text:"Funny / teasing friends", points:{"Pepe the Frog":3,"Distracted Boyfriend":2}},{text:"Trendy and social", points:{"Distracted Boyfriend":3}}]},
  {q:"Reaction when tagged in a meme?", choices:[{text:"Share it immediately", points:{"Doge":2,"Pepe the Frog":3}},{text:"Laugh quietly", points:{"Expanding Brain":3}},{text:"Comment dramatically", points:{"Woman Yelling at Cat":3}},{text:"Make a joke back", points:{"Pepe the Frog":3,"Distracted Boyfriend":2}},{text:"Ignore it", points:{"Expanding Brain":2}}]}
];

let scores={};

// Daily streak
function updateStreak(){
  let last=localStorage.getItem("lastPlay");
  let streak=parseInt(localStorage.getItem("streak")||0);
  const today=new Date().toDateString();
  if(last!==today){
    if(last && new Date(last).getDate()===new Date(Date.now()-86400000).getDate()){ streak++; } else { streak=1; }
    localStorage.setItem("streak",streak);
    localStorage.setItem("lastPlay",today);
  }
  const badge=streak>=7?"🏆 Meme Master":streak>=3?"🔥 Meme Enthusiast":"✨ Meme Novice";
  document.getElementById("streak").innerHTML=`Daily Streak: ${streak} | Badge: ${badge}`;
  if(streak>=3){ launchConfetti(); }
}

// Confetti
function launchConfetti(){ const duration=3*1000; const end=Date.now()+duration; (function frame(){ confetti({ particleCount:5, spread:70, origin:{y:0.6}, scalar:1.2 }); if(Date.now()<end){ requestAnimationFrame(frame); } })(); }

function startQuiz(){ updateStreak(); scores={}; memes.forEach(m=>scores[m.name]=0); showQuestion(0); }

function showQuestion(i){
  if(i>=questions.length){ showCountdown(); return; }
  const quizDiv=document.getElementById("quiz"); quizDiv.innerHTML=`<p>${questions[i].q}</p>`;
  questions[i].choices.forEach(c=>{
    const btn=document.createElement("button"); btn.innerText=c.text; btn.className="choice-btn";
    btn.onclick=()=>{ for(let m in c.points) scores[m]+=c.points[m]; showQuestion(i+1); };
    quizDiv.appendChild(btn);
  });
}

function showCountdown(){
  document.getElementById("quiz").style.display="none";
  const cd=document.getElementById("countdown"); let t=3;
  cd.innerHTML="Calculating your meme... "+t;
  const interval=setInterval(()=>{ t--; cd.innerHTML="Calculating your meme... "+t; if(t<=0){ clearInterval(interval); cd.innerHTML=""; showResult(); } },1000);
}

function showResult(){
  document.getElementById("dingSound").play();
  let topMeme=memes[0], max=-1;
  memes.forEach(m=>{ if(scores[m.name]>max){ max=scores[m.name]; topMeme=m; } });
  const trait=traits[Math.floor(Math.random()*traits.length)];
  const emoji=emojis[Math.floor(Math.random()*emojis.length)];
  const phrase=phrases[Math.floor(Math.random()*phrases.length)];
  document.body.style.background=topMeme.color;
  document.getElementById(topMeme.sound)?.play();

  const resultDiv=document.getElementById("result");
  resultDiv.innerHTML=`
    <h2 style="font-size:3em;">${emoji}</h2>
    <h2>You are: ${topMeme.name}!</h2>
    <img src="${topMeme.img}" alt="${topMeme.name}">
    <p>${trait}</p>
    <p><i>${phrase}</i></p>
    <div class="share-buttons">
      <button class="download-btn" onclick="generateMemeCard()">Download / Share</button>
    </div>
    <button onclick="restartQuiz()" style="margin-top:20px;">Try Again</button>
  `;
  updateLeaderboard(topMeme.name);
}

function generateMemeCard(){
  html2canvas(document.getElementById("result")).then(canvas=>{
    const link=document.createElement('a'); link.download='my-meme-card.png'; link.href=canvas.toDataURL(); link.click();
  });
}

function restartQuiz(){
  document.getElementById("quiz").style.display="block";
  document.getElementById("quiz").innerHTML=`<button onclick="startQuiz()">Start Quiz</button>`;
  document.getElementById("result").innerHTML="";
  document.body.style.background="#111";
}

function updateLeaderboard(meme){
  let board=JSON.parse(localStorage.getItem('memeLeaderboard')||'{}');
  board[meme]=(board[meme]||0)+1;
  localStorage.setItem('memeLeaderboard',JSON.stringify(board));
  const boardDiv=document.getElementById("leaderboard");
  let html=`<h3>Leaderboard (All Time)</h3><ul>`;
  Object.entries(board).sort((a,b)=>b[1]-a[1]).forEach(([name,score])=>{ html+=`<li>${name}: ${score}</li>`; });
  html+="</ul>";
  boardDiv.innerHTML=html;
}

updateStreak();
updateLeaderboard();
</script>
</body>
</html>
